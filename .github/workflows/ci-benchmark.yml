name: CI Benchmark (No Cache)

on:
  workflow_dispatch:

env:
  PYTHON_VERSION: '3.14'
  FLAKY_TESTS: keep_retrying
  CLANG_VERSION: '19'
  # Remove sccache from compiler commands
  CC: clang-19
  CXX: clang++-19
  # Disable sccache
  SCCACHE_GHA_ENABLED: 'false'
  RUSTC_VERSION: '1.82'

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        runner:
          - monkci-ubuntu-24.04-4-3000iops
          - monkci-ubuntu-24.04-4-3600iops
          - monkci-ubuntu-24.04-4-4000-290iops
          - monkci-ubuntu-24.04-4-3600-150iops
          - monkci-ubuntu-24.04-4-3600-200iops
          - monkci-ubuntu-24.04-4-3600-250iops
          - monkci-ubuntu-24.04-4-3600-300iops
          - monkci-ubuntu-24.04-4-3600-350iops

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          path: node
          # Disable git LFS cache
          lfs: false

      - name: Install fio
        run: |
          # Clear APT cache first
          sudo apt-get clean
          sudo rm -rf /var/lib/apt/lists/*
          # Fresh package list
          sudo apt-get update
          # Install without recommendations to reduce cached packages
          sudo apt-get install -y --no-install-recommends fio

      - name: Install Clang ${{ env.CLANG_VERSION }}
        uses: ./node/.github/actions/install-clang
        with:
          clang-version: ${{ env.CLANG_VERSION }}

      - name: Install Rust ${{ env.RUSTC_VERSION }}
        run: |
          rustup override set "$RUSTC_VERSION"
          rustup --version
          # Clear Rust cache
          rm -rf ~/.cargo/registry
          rm -rf ~/.cargo/git
          rm -rf target/

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          allow-prereleases: true
          # Disable pip caching
          cache: ''

      # REMOVED: sccache-action step entirely
      # - name: Set up sccache
      #   uses: Mozilla-Actions/sccache-action@v0.0.9

      - name: Clean build directory
        run: |
          # Ensure completely clean build
          rm -rf node/out
          rm -rf node/.ninja_deps
          rm -rf node/.ninja_log
          make -C node clean || true

      - name: Build (No Cache)
        run: |
          # Verify no sccache is active
          echo "CC=$CC"
          echo "CXX=$CXX"
          which $CC
          which $CXX

          # Clean build from scratch
          make -C node build-ci -j4 V=1 CONFIG_FLAGS="--error-on-warn --v8-enable-temporal-support"
        env:
          # Ensure sccache is disabled
          SCCACHE_DISABLE: '1'
